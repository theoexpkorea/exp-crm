<!DOCTYPE html>
<html lang="ko">
<head>
<meta property="og:title" content="theo · CRM 관리">
<meta property="og:description" content="가망고객 · 매도임대 · 계약고객 연락 관리 시스템입니다.">
<meta property="og:image" content="https://theoexpkorea.github.io/exp-crm/og-image.png">
<meta property="og:url" content="https://theoexpkorea.github.io/exp-crm/">
<meta property="og:type" content="website">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3B1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CRM">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<title>CRM</title>
<style>
  :root{
    --bg:#F4F5F7; --surface:#FFFFFF; --ink:#15181E; --muted:#727A86;
    --line:#E6E8EC; --line-2:#EEF0F3; --accent:#96640F; --accent-soft:#FBF1E2;
    --chip:#F1F2F5;
    --danger:#E03A3A; --danger-bg:#FDECEC;
    --warn:#9A5B14; --warn-bg:#FBF1E2;
    --ok:#1F7A4D; --ok-bg:#E7F4ED;
    --shadow:0 1px 2px rgba(20,24,32,.04),0 6px 16px rgba(20,24,32,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0; overscroll-behavior-y:none; height:100%}
  *{-webkit-touch-callout:none; -webkit-user-select:none; user-select:none;}
  input, textarea{-webkit-user-select:text; user-select:text; -webkit-touch-callout:default;}
  body{
    font-family:"Pretendard","Pretendard Variable",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    font-feature-settings:"tnum" 1; -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .tnum{font-variant-numeric:tabular-nums}

  /* 잠금화면 */
  #lockScreen{
    position:fixed; inset:0; z-index:999; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px 24px; padding-top:calc(env(safe-area-inset-top) + 32px);
  }
  #lockScreen .lock-logo{font-size:28px; font-weight:800; letter-spacing:-.04em; margin-bottom:6px; color:var(--ink)}
  #lockScreen .lock-logo .o{color:var(--accent)}
  #lockScreen .lock-sub{font-size:13px; color:var(--muted); font-weight:600; margin-bottom:40px}
  #lockScreen .lock-box{width:100%; max-width:320px; background:var(--surface); border-radius:18px; padding:28px 24px; box-shadow:var(--shadow); border:1px solid var(--line)}
  #lockScreen .lock-title{font-size:15px; font-weight:800; color:var(--ink); margin-bottom:16px; text-align:center}
  #lockScreen .lock-input{
    width:100%; height:52px; border:1px solid var(--line); border-radius:12px;
    background:var(--bg); padding:0 16px; font-size:20px; font-family:inherit;
    text-align:center; letter-spacing:6px; outline:0; color:var(--ink);
    font-variant-numeric:tabular-nums; margin-bottom:12px;
  }
  #lockScreen .lock-input:focus{border-color:var(--accent); background:#fff}
  #lockScreen .lock-btn{width:100%; height:52px; border:0; border-radius:13px; background:var(--ink); color:#fff; font-size:15.5px; font-weight:800; cursor:pointer; font-family:inherit; transition:.12s}
  #lockScreen .lock-btn:active{opacity:.85}
  #lockScreen .lock-err{font-size:13px; font-weight:700; color:var(--danger); text-align:center; margin-top:10px; min-height:20px}

  /* 헤더 */
  header{
    position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px;
    z-index:30; background:var(--surface);
    border-bottom:1px solid var(--line); border-left:1px solid var(--line); border-right:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 14px) 16px 16px;
    box-sizing:border-box;
  }
  @media (min-width:481px){
    body{background:var(--line-2)}
    header{top:0}
  }
  .head-row{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:12px}
  .brand{display:flex; align-items:baseline; gap:8px}
  .brand .logo{font-size:21px; font-weight:800; letter-spacing:-.04em; margin:0; color:var(--ink); line-height:1}
  .brand .logo .o{color:var(--accent)}
  .brand .by{font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.02em}
  .count{font-size:13px; color:var(--muted); font-weight:600; flex:none}
  .count b{color:var(--accent); font-weight:800}

  .search{display:flex; align-items:center; gap:8px; background:var(--chip); border-radius:11px; padding:0 12px; height:40px; margin-bottom:10px}
  .search svg{flex:none; opacity:.5}
  .search input{border:0; background:transparent; outline:0; width:100%; height:100%; font-size:14.5px; color:var(--ink); font-family:inherit}
  .search input::placeholder{color:#9aa1ab}

  .chips{display:flex; gap:7px; overflow-x:auto; padding-bottom:2px; margin-bottom:2px; -ms-overflow-style:none; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:none; padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:700;
    background:var(--chip); color:var(--muted); border:1px solid transparent; cursor:pointer; white-space:nowrap;
    transition:background .12s, color .12s;
  }
  .chip.on{background:var(--ink); color:#fff}
  .chip.cat-SALE.on{background:#DCEBFD; color:#1D5FBF; border-color:#B9D8F9}
  .chip.cat-LEAD.on{background:#DCF3E9; color:#12805E; border-color:#B7E5D2}
  .chip.cat-CONTRACT.on{background:#EBE3FB; color:#6A3FB0; border-color:#D5C4F5}
  .chip.today-toggle{background:var(--danger-bg); color:var(--danger); font-weight:800}
  .chip.today-toggle.on{background:var(--danger); color:#fff}

  #headerSpacer{width:100%}

  main{
    max-width:480px; margin:0 auto; box-sizing:border-box;
    padding:18px 12px calc(env(safe-area-inset-bottom) + 24px);
  }
  @media (min-width:481px){
    main{background:var(--bg); border-left:1px solid var(--line); border-right:1px solid var(--line); min-height:100vh}
  }

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:14px 15px; margin:0 4px 11px; box-shadow:var(--shadow);
  }
  .card.overdue{border-color:#F3C7C7}
  .card-top{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px}
  .card-top .tags{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
  .icon-btn{
    flex:none; width:26px; height:26px; border-radius:8px; border:0;
    background:transparent; color:#B7BCC4; display:flex; align-items:center; justify-content:center;
    cursor:pointer; padding:0;
  }
  .icon-btn:active{opacity:.6; background:var(--chip); color:var(--muted)}
  .tag{font-size:11px; font-weight:800; padding:3px 8px; border-radius:7px; background:#F0F1F4; color:#3B414C}
  .tag.status{background:var(--accent-soft); color:var(--accent)}
  .tag.temp-hot{background:#FDECEC; color:#C0392B}
  .tag.temp-warm{background:#FBF1E2; color:#9A5B14}
  .tag.temp-cold{background:#EAF2FE; color:#1D5FBF}
  .badge{font-size:11.5px; font-weight:800; padding:3px 9px; border-radius:999px; flex:none}
  .badge.overdue{background:var(--danger-bg); color:var(--danger)}
  .badge.today{background:var(--warn-bg); color:var(--warn)}
  .badge.upcoming{background:var(--ok-bg); color:var(--ok)}

  .card .name{font-size:16px; font-weight:800; letter-spacing:-.01em; margin:0 0 2px}
  .card .id{font-size:12.5px; color:var(--muted); font-weight:600; margin-bottom:7px}
  .date-chip{
    display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700;
    color:var(--muted); background:var(--bg); border-radius:7px; padding:4px 9px; margin-bottom:9px;
  }
  .date-chip svg{flex:none}
  .note-chip{
    display:flex; align-items:flex-start; gap:6px; font-size:12px; font-weight:500;
    color:var(--muted); background:var(--bg); border-radius:9px; padding:8px 10px;
    margin-bottom:10px; line-height:1.45;
  }
  .note-chip svg{flex:none; margin-top:1px}
  .card .memo{font-size:12.5px; color:var(--muted); line-height:1.5; white-space:pre-line; margin-bottom:10px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}

  .card .row{display:flex; gap:8px}
  .btn{
    flex:1; height:42px; border-radius:11px; border:1.5px solid var(--line);
    background:var(--surface); color:var(--ink); font-size:13.5px; font-weight:800;
    display:flex; align-items:center; justify-content:center; gap:6px;
    cursor:pointer; font-family:inherit; text-decoration:none;
  }
  .btn:active{opacity:.75}
  .btn svg{flex:none}
  .btn.gray-fill{background:var(--chip); border-color:var(--line)}
  .btn.btn-done{background:var(--ok); color:#fff; border-color:var(--ok)}
  .statusmenu{position:fixed; z-index:80; background:var(--surface); border:1px solid var(--line);
    border-radius:13px; box-shadow:0 12px 30px rgba(20,24,32,.16); overflow-y:auto; display:none;
    min-width:180px; max-width:calc(100vw - 32px); max-height:50vh; padding:6px}
  .statusmenu.on{display:block}
  .statusmenu button{display:flex; align-items:center; justify-content:space-between; width:100%;
    background:0; border:0; border-radius:9px; padding:12px 12px; font-size:14.5px; font-weight:500; color:var(--ink);
    cursor:pointer; text-align:left; font-family:inherit}
  .statusmenu button:active{background:var(--bg)}
  .statusmenu button.on{color:var(--accent); font-weight:700; background:var(--accent-soft)}
  .btn.primary{background:var(--accent); color:#fff; border-color:var(--accent)}
  .name-link{color:inherit; text-decoration:none; display:inline-flex; align-items:center; gap:5px}
  .name-link svg{color:var(--muted); flex:none}

  .panel{
    margin-top:12px; padding-top:12px; border-top:1px solid var(--line-2);
    display:none;
  }
  .panel.show{display:block}
  .field{margin-bottom:10px}
  .field label{display:block; font-size:11.5px; font-weight:700; color:var(--muted); margin-bottom:5px}
  .field select, .field textarea, .field input[type=text], .field input[type=tel], .field input[type=date]{
    width:100%; border:1px solid var(--line); border-radius:10px; padding:9px 11px;
    font-size:14px; font-family:inherit; color:var(--ink); outline:0; background:var(--bg);
    -webkit-user-select:text; user-select:text;
  }
  .field select:focus, .field textarea:focus, .field input:focus{border-color:var(--accent); background:#fff}
  .field textarea{resize:none; min-height:56px; line-height:1.4}
  .date-trigger{
    width:100%; border:1px solid var(--line); border-radius:10px; padding:9px 11px;
    font-size:14px; font-family:inherit; color:var(--ink); background:var(--bg);
    display:flex; align-items:center; justify-content:space-between; cursor:pointer;
  }
  .date-trigger svg{flex:none; color:var(--muted)}
  .preview{
    font-size:12.5px; color:var(--muted); background:var(--bg); border-radius:10px;
    padding:9px 11px; margin-bottom:10px; line-height:1.4;
  }
  .preview b{color:var(--ink); font-weight:800}

  .empty{text-align:center; padding:64px 24px; color:var(--muted)}
  .empty .em-t{font-size:15px; font-weight:700; color:var(--ink); margin-bottom:6px}
  .empty .em-s{font-size:13px}

  .loading{text-align:center; padding:80px 24px; color:var(--muted)}
  .loading .sp{display:inline-block; width:28px; height:28px; border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin-bottom:12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .filter-btn{
    flex:none; height:40px; padding:0 13px; border-radius:11px; border:1px solid var(--line);
    background:var(--surface); color:var(--ink); font-size:13px; font-weight:700;
    display:flex; align-items:center; gap:6px; cursor:pointer; font-family:inherit;
  }
  .filter-badge{
    min-width:16px; height:16px; padding:0 4px; border-radius:999px; background:var(--accent);
    color:#fff; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center;
  }
  .scrim{position:fixed; inset:0; background:rgba(15,18,24,.42); z-index:60; opacity:0;
    pointer-events:none; transition:.2s}
  .scrim.on{opacity:1; pointer-events:auto}
  .fsheet{
    position:fixed; left:50%; right:auto; bottom:0; z-index:70; background:var(--surface);
    width:100%; max-width:480px; transform:translate(-50%,100%); transition:transform .26s cubic-bezier(.32,.72,0,1);
    border-radius:20px 20px 0 0; max-height:80vh; display:flex; flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom); overflow:hidden; box-sizing:border-box;
  }
  .fsheet.on{transform:translate(-50%,0)}
  .fsheet-grip{width:38px; height:4px; background:#D9DCE1; border-radius:3px; margin:10px auto 4px; flex:none}
  .fsheet-head{display:flex; align-items:center; justify-content:space-between; padding:6px 18px 12px;
    border-bottom:1px solid var(--line); flex:none}
  .fsheet-head h2{font-size:16px; font-weight:800; margin:0}
  .fsheet-head .freset{font-size:13px; font-weight:700; color:var(--muted); background:0; border:0; cursor:pointer; font-family:inherit}
  .fsheet-body{overflow-y:auto; padding:4px 18px 24px; flex:1 1 auto; min-height:0}
  .fgroup{padding:16px 0; border-bottom:1px solid var(--line-2)}
  .fgroup:last-child{border-bottom:0}
  .fgroup > .ft{font-size:13px; font-weight:800; margin-bottom:11px}
  .fopts{display:flex; flex-wrap:wrap; gap:7px}
  .fopt{border:1px solid var(--line); background:var(--surface); color:var(--muted);
    font-size:13.5px; font-weight:700; padding:8px 13px; border-radius:9px; cursor:pointer; font-family:inherit}
  .fopt.on{background:var(--accent-soft); color:var(--accent); border-color:var(--accent)}
  .fsheet-foot{padding:12px 18px calc(12px + env(safe-area-inset-bottom)); border-top:1px solid var(--line);
    background:var(--surface); flex:none}
  .fapply{width:100%; height:52px; border:0; border-radius:13px; background:var(--ink); color:#fff;
    font-size:15.5px; font-weight:800; cursor:pointer; font-family:inherit}

  #toast{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(8px);
    background:#15181E; color:#fff; padding:11px 18px; border-radius:12px;
    font-size:13px; font-weight:700; z-index:999; box-shadow:0 8px 24px rgba(0,0,0,.28);
    opacity:0; transition:opacity .2s ease, transform .2s ease; max-width:88vw; text-align:center;
    pointer-events:none;
  }

  /* CRM 등록 FAB */
  .fab-add{
    position:fixed; z-index:50; height:52px; padding:0 20px 0 16px; border:0; border-radius:999px;
    background:var(--accent); color:#fff; box-shadow:0 10px 24px rgba(150,100,15,.4);
    display:flex; align-items:center; gap:7px; cursor:grab; touch-action:none;
    font-family:inherit; font-size:14px; font-weight:800; white-space:nowrap; transition:box-shadow .12s;
  }
  .fab-add:active{cursor:grabbing; box-shadow:0 4px 14px rgba(150,100,15,.4)}
  .fab-add svg{flex:none}

  /* CRM 등록 시트 탭 */
  .addtabs{display:flex; background:var(--chip); border-radius:11px; padding:3px; gap:3px}
  .addtab{
    flex:1; height:38px; border:0; border-radius:9px; background:transparent; color:var(--muted);
    font-size:13px; font-weight:800; cursor:pointer; font-family:inherit;
  }
  .addtab.on{background:var(--surface); color:var(--ink); box-shadow:0 1px 3px rgba(20,24,32,.12)}
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-logo">the<span class="o">o</span></div>
  <div class="lock-sub">CRM 관리 · eXp Korea</div>
  <div class="lock-box">
    <div class="lock-title">비밀번호를 입력하세요.</div>
    <input id="lockInput" class="lock-input" type="password" name="pin-code-not-a-password"
      inputmode="numeric" maxlength="8" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false">
    <button class="lock-btn" id="lockBtn">확인</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<header>
  <div class="head-row">
    <div class="brand">
      <span class="logo" onclick="event.preventDefault(); state.cat='전체'; state.q=''; state.todayOnly=false; state.statusFilter.clear(); document.getElementById('q').value=''; buildChips(); render();">the<span class="o">o</span></span>
      <span class="by">CRM 관리 · eXp Korea</span>
    </div>
    <div class="count"><b id="cnt">0</b>건</div>
  </div>
  <div style="display:flex; gap:8px; margin-bottom:10px">
    <div class="search" style="flex:1; margin-bottom:0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="이름 · 주소 · 코드 · 연락처 검색">
    </div>
    <button class="filter-btn" id="openFilters">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 5h18M6 12h12M10 19h4"/></svg>
      상태
      <span class="filter-badge" id="fbadge" style="display:none">0</span>
    </button>
  </div>
  <div class="chips" id="chips"></div>
</header>
<div id="headerSpacer"></div>

<main id="list">
  <div class="loading"><div class="sp"></div><div>불러오는 중...</div></div>
</main>

<div class="scrim" id="scrim"></div>
<div class="fsheet" id="fsheet">
  <div class="fsheet-grip"></div>
  <div class="fsheet-head">
    <h2>상태 필터</h2>
    <button class="freset" id="fReset">초기화</button>
  </div>
  <div class="fsheet-body" id="fsheetBody"></div>
  <div class="fsheet-foot">
    <button class="fapply" id="fApply">결과 보기</button>
  </div>
</div>

<div class="fsheet" id="addsheet">
  <div class="fsheet-grip"></div>
  <div class="fsheet-head">
    <h2 id="addsheetTitle">CRM 등록</h2>
    <button class="freset" id="addClose">닫기</button>
  </div>
  <div style="padding:12px 18px 0" id="addTabsWrap">
    <div class="addtabs" id="addTabs">
      <button type="button" class="addtab on" data-cat="SALE">매도임대</button>
      <button type="button" class="addtab" data-cat="LEAD">가망고객</button>
      <button type="button" class="addtab" data-cat="CONTRACT">계약고객</button>
    </div>
  </div>
  <div class="fsheet-body" id="addsheetBody"></div>
  <div class="fsheet-foot">
    <button class="fapply" id="addSave">저장</button>
  </div>
</div>

<button id="fabAdd" class="fab-add" type="button">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg>
  CRM 등록
</button>

<div class="statusmenu" id="statusmenu"></div>

<div id="toast"></div>

<script>
/* ===================== 설정 ===================== */
const CONFIG = {
  DATA_URL: "https://script.google.com/macros/s/AKfycbzDk9DYfD7okIfp4_MH5asXVxgroC9qlYGL08yHL_0dXPDfWElTdKglhQ-BQxWVoiil/exec"
};
const CAT_ORDER = ["SALE","LEAD","CONTRACT"];
const CAT_LABEL = { SALE:"매도임대", LEAD:"가망고객", CONTRACT:"계약고객" };
const NEXT_DAYS_DEFAULT = { SALE:20, CONTRACT:30 };
const LEAD_TEMP_DAYS = { "핫":7, "웜":14, "콜드":30 };

function estimateNext(cat, status){
  if(cat==="LEAD"){
    const d = LEAD_TEMP_DAYS[status] || 30;
    return addDays(todayStr(), d);
  }
  return addDays(todayStr(), NEXT_DAYS_DEFAULT[cat] || 20);
}
const CARD_SCANNER_URL = "https://theoexpkorea.github.io/card-scanner/";
const EXP_MAEMUL_URL = "https://theoexpkorea.github.io/exp-maemul/";

let ALL_ITEMS = [];
let STATUS_OPTIONS = {};
let STATUS_SEL = {};
let state = { cat:"전체", q:"", todayOnly:false, statusFilter:new Set() };

function tempClass(s){
  if(s==="핫") return "temp-hot";
  if(s==="웜") return "temp-warm";
  if(s==="콜드") return "temp-cold";
  return "";
}

const SALE_STATUS_COLOR = {
  "접수":{bg:"#E8F5E9",fg:"#1B5E20"}, "광고중":{bg:"#E3F2FD",fg:"#0D47A1"},
  "광고보류":{bg:"#FFF8E1",fg:"#F57F17"}, "광고만료":{bg:"#FBE9E7",fg:"#BF360C"},

/* ===================== JSONP 유틸 ===================== */
function jsonp(url, timeoutMs){
  return new Promise(function(resolve, reject){
    const cb = "__crm_cb_"+Date.now()+"_"+Math.floor(Math.random()*100000);
    const s = document.createElement("script");
    let done = false;
    window[cb] = function(data){ done=true; cleanup(); resolve(data); };
    function cleanup(){ try{ delete window[cb]; }catch(e){} if(s.parentNode) s.parentNode.removeChild(s); }
    s.onerror = function(){ if(!done){ cleanup(); reject(new Error("load fail")); } };
    const sep = url.indexOf("?")>=0 ? "&" : "?";
    s.src = url + sep + "callback=" + cb;
    document.head.appendChild(s);
    setTimeout(function(){ if(!done){ cleanup(); reject(new Error("timeout")); } }, timeoutMs);
  });
}
async function jsonpRetry(url, timeoutMs){
  try{ return await jsonp(url, timeoutMs); }
  catch(e){ await new Promise(r=>setTimeout(r,800)); return await jsonp(url, timeoutMs); }
}

/* ===================== 날짜 유틸 ===================== */
function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function addDays(dateStr, n){
  const base = dateStr ? new Date(dateStr+"T00:00:00") : new Date();
  base.setDate(base.getDate()+n);
  return base.getFullYear()+"-"+String(base.getMonth()+1).padStart(2,"0")+"-"+String(base.getDate()).padStart(2,"0");
}
function dDay(nextStr){
  if(!nextStr) return null;
  const t = new Date(todayStr()+"T00:00:00");
  const n = new Date(nextStr+"T00:00:00");
  return Math.round((n - t) / 86400000);
}
function dDayBadge(nextStr){
  const d = dDay(nextStr);
  if(d===null) return "";
  if(d < 0) return `<span class="badge overdue">D+${-d} 지남</span>`;
  if(d === 0) return `<span class="badge today">오늘</span>`;
  return `<span class="badge upcoming">D-${d}</span>`;
}

function buildChips(){
  const chips = document.getElementById("chips");
  const cats = ["전체", ...CAT_ORDER];
  const todayCount = ALL_ITEMS.filter(d=>{ const x=dDay(d.nextContact); return x!==null && x<=0; }).length;
  let html = `<div class="chip today-toggle ${state.todayOnly?'on':''}" data-today="1">Today ${todayCount}건</div>`;
  html += cats.map(c=>{
    const label = c==="전체" ? "전체" : CAT_LABEL[c];
    const on = state.cat===c ? "on" : "";
    const catClass = c==="전체" ? "" : "cat-"+c;
    return `<div class="chip ${catClass} ${on}" data-cat="${c}">${label}</div>`;
  }).join("");
  chips.innerHTML = html;
  chips.querySelector("[data-today]").addEventListener("click", ()=>{
    state.todayOnly = !state.todayOnly; buildChips(); render();
  });
  chips.querySelectorAll("[data-cat]").forEach(el=>{
    el.addEventListener("click", ()=>{ state.cat = el.dataset.cat; buildChips(); render(); });
  });
}

    return `

        <div class="fopts" data-group="${cat}">
          ${opts.map(o=>{

function filtered(){
  const q = state.q.trim().toLowerCase();
  return ALL_ITEMS.filter(d=>{
    if(state.cat!=="전체" && d.cat!==state.cat) return false;
    if(state.todayOnly){ const x=dDay(d.nextContact); if(x===null || x>0) return false; }
    if(state.statusFilter.size && !state.statusFilter.has(d.status)) return false;
    if(q){
      const hay = (d.name+" "+(d.name2||"")+" "+(d.addr||"")+" "+(d.remark||"")+" "+d.id+" "+d.tel).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>{
    const da = a.nextContact ? new Date(a.nextContact) : new Date("2999-12-31");
    const db = b.nextContact ? new Date(b.nextContact) : new Date("2999-12-31");
    return da - db;
  });
}

const statusmenu = document.getElementById("statusmenu");
function openStatusMenu(key, cat){
  const opts = STATUS_OPTIONS[cat] || [];
  const cur = key.indexOf("new_")===0 ? NEW_STATUS_SEL[cat] : STATUS_SEL[key];
  statusmenu.innerHTML = opts.map(o=>
    `<button data-v="${o}" class="${o===cur?'on':''}"><span>${o}</span>${o===cur?'<span>✓</span>':''}</button>`
  ).join("");
  const btn = document.getElementById("statusTrig_"+key).getBoundingClientRect();
  statusmenu.style.left = btn.left+"px";
  statusmenu.style.width = btn.width+"px";
  statusmenu.classList.add("on");
  const menuH = statusmenu.offsetHeight;
  const spaceBelow = window.innerHeight - btn.bottom;
  let top = btn.bottom + 6;
  if(spaceBelow < menuH + 16 && btn.top - menuH - 6 > 8){
    top = btn.top - menuH - 6;
  }
  top = Math.max(8, Math.min(top, window.innerHeight - menuH - 8));
  statusmenu.style.top = top+"px";
  statusmenu.dataset.key = key;
  statusmenu.dataset.cat = cat;
  document.getElementById("scrim").classList.add("on");
}

  statusmenu.classList.remove("on");
  document.getElementById("scrim").classList.remove("on");

async function createEntry(){
  const cat = addCat;
  const name = fv("new_name_"+cat);
  if(!name){ showToast("성명을 입력해 주세요."); return; }
  const tel = fv("new_tel_"+cat);
  const base = fv("new_base_"+cat) || todayStr();
  const status = NEW_STATUS_SEL[cat] || "";
  const payload = { sheet:cat, name:name, tel:tel, baseDate:base, status:status };

  if(cat==="SALE"){
    payload.id = fv("new_id_SALE");
  } else {
    const idVal = fv("new_id_"+cat);
    if(!idVal){ showToast("고객번호를 입력해 주세요."); return; }
    payload.id = idVal;
  }
  if(cat==="LEAD"){ payload.name2 = fv("new_name2_LEAD"); payload.remark = fv("new_remark_LEAD"); }

  const saveBtn = document.getElementById("addSave");
  saveBtn.disabled = true; saveBtn.textContent = "저장 중...";

  const qs = Object.keys(payload).map(k=>encodeURIComponent(k)+"="+encodeURIComponent(payload[k])).join("&");
  const url = CONFIG.DATA_URL + "?mode=crmCreate&" + qs;

  try{
    const res = await jsonpRetry(url, 15000);
    if(res && res.ok && res.item){
      ALL_ITEMS.push(res.item);
      try{ localStorage.setItem(DATA_CACHE_KEY, JSON.stringify(ALL_ITEMS)); }catch(e){}
      closeAllOverlays();
      buildChips();
      render();
      showToast(CAT_LABEL[cat]+" 등록됐어요.");
    } else if(res && res.error === "dup_id"){
      showToast("이미 있는 고객번호(매물번호)예요. 확인해 주세요.");
    } else {
      showToast("등록에 실패했어요. 다시 시도해 주세요.");
    }
  }catch(e){
    showToast("연결이 원활하지 않아요. 다시 시도해 주세요.");
  }finally{
    saveBtn.disabled = false; saveBtn.textContent = "저장";
  }
}

async function updateEntry(){
  const cat = editItemData.cat, row = editItemData.row, key = editItemData.key;
  const name = fv("new_name_"+cat);
  if(!name){ showToast("성명을 입력해 주세요."); return; }
  const tel = fv("new_tel_"+cat);
  const status = NEW_STATUS_SEL[cat] || "";
  const idVal = fv("new_id_"+cat);
  if(cat!=="SALE" && !idVal){ showToast("고객번호를 입력해 주세요."); return; }

  const payload = { sheet:cat, row:row, name:name, tel:tel };
  if(idVal) payload.id = idVal;
  if(status) payload.status = status;
  if(cat==="LEAD"){ payload.name2 = fv("new_name2_LEAD"); payload.remark = fv("new_remark_LEAD"); }

  const saveBtn = document.getElementById("addSave");
  saveBtn.disabled = true; saveBtn.textContent = "저장 중...";

  const qs = Object.keys(payload).map(k=>encodeURIComponent(k)+"="+encodeURIComponent(payload[k])).join("&");
  const url = CONFIG.DATA_URL + "?mode=crmUpdate&" + qs;

  try{
    const res = await jsonpRetry(url, 15000);
    if(res && res.ok){
      const item = ALL_ITEMS.find(x=>x.cat===cat && x.row===row);
      if(item){
        item.name = name;
        item.tel = tel;
        if(idVal) item.id = idVal;
        if(status) item.status = status;
        if(cat==="LEAD"){ item.name2 = payload.name2; item.remark = payload.remark; }
        if(res.nextContact) item.nextContact = res.nextContact;
      }
      try{ localStorage.setItem(DATA_CACHE_KEY, JSON.stringify(ALL_ITEMS)); }catch(e){}
      closeAllOverlays();
      buildChips();
      render();
      showToast("수정됐어요.");
    } else {
      showToast("수정에 실패했어요. 다시 시도해 주세요.");
    }
  }catch(e){
    showToast("연결이 원활하지 않아요. 다시 시도해 주세요.");
  }finally{
    saveBtn.disabled = false; saveBtn.textContent = "저장";
  }
}

document.getElementById("addSave").addEventListener("click", ()=>{

});

/* ===================== 움직이는 CRM 등록 버튼 (드래그) ===================== */
(function(){
  const fab = document.getElementById("fabAdd");
  const FAB_POS_KEY = "theo_crm_fab_pos";
  const margin = 12;

  function clamp(x, y){
    const w = fab.offsetWidth, h = fab.offsetHeight;
    const maxX = Math.max(margin, window.innerWidth - w - margin);
    const maxY = Math.max(margin, window.innerHeight - h - margin);
    return { x: Math.min(Math.max(x, margin), maxX), y: Math.min(Math.max(y, margin), maxY) };
  }
  function setPos(x, y){
    fab.style.left = x+"px";
    fab.style.top = y+"px";
  }
  function savePos(x, y){
    try{ localStorage.setItem(FAB_POS_KEY, JSON.stringify({x:x,y:y})); }catch(e){}
  }
  function initPos(){
    let pos = null;
    try{
      const raw = localStorage.getItem(FAB_POS_KEY);
      if(raw) pos = JSON.parse(raw);
    }catch(e){}
    if(pos && typeof pos.x === "number" && typeof pos.y === "number"){
      const c = clamp(pos.x, pos.y);
      setPos(c.x, c.y);
    } else {
      const x = window.innerWidth - fab.offsetWidth - 20;
      const y = window.innerHeight - fab.offsetHeight - 96;
      const c = clamp(x, y);
      setPos(c.x, c.y);
    }
  }

  let dragging = false, moved = false, startX = 0, startY = 0, origX = 0, origY = 0;
  fab.addEventListener("pointerdown", e=>{
    dragging = true; moved = false;
    startX = e.clientX; startY = e.clientY;
    const rect = fab.getBoundingClientRect();
    origX = rect.left; origY = rect.top;
    fab.setPointerCapture(e.pointerId);
  });
  fab.addEventListener("pointermove", e=>{
    if(!dragging) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if(Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
    const c = clamp(origX + dx, origY + dy);
    setPos(c.x, c.y);
  });
  function onUp(){
    if(!dragging) return;
    dragging = false;
    const rect = fab.getBoundingClientRect();
    savePos(rect.left, rect.top);
    if(!moved) openAddSheet();
  }
  fab.addEventListener("pointerup", onUp);
  fab.addEventListener("pointercancel", onUp);

  window.addEventListener("resize", ()=>{
    const rect = fab.getBoundingClientRect();
    const c = clamp(rect.left, rect.top);
    setPos(c.x, c.y);
  });

  initPos();
})();

async function saveContact(cat, row, key){
  const memoVal = document.getElementById("memo_"+key).value.trim();
  const statusVal = STATUS_SEL[key] || "";

  const url = CONFIG.DATA_URL + "?mode=crmUpdate&sheet="+encodeURIComponent(cat)
    + "&row="+encodeURIComponent(row)
    + "&lastDate="+encodeURIComponent(todayStr())
    + (memoVal ? "&memo="+encodeURIComponent(memoVal) : "")
    + (statusVal ? "&status="+encodeURIComponent(statusVal) : "");

  try{
    const res = await jsonpRetry(url, 15000);
    if(res && res.ok){
      const item = ALL_ITEMS.find(x=>x.cat===cat && x.row===row);
      const newNext = res.nextContact || (item ? item.nextContact : "");
      if(item){
        item.lastContact = todayStr();
        item.nextContact = newNext;
        if(statusVal) item.status = statusVal;
        if(memoVal){
          const tag = new Date().toISOString().slice(5,10).replace("-","/");
          item.memo = (item.memo ? item.memo+"\n" : "") + tag + " " + memoVal;
        }
      }
      showToast("저장됐어요 · 다음 연락일 "+newNext);
      render();
    } else {
      showToast("저장에 실패했어요. 다시 시도해 주세요.");
    }
  }catch(e){
    showToast("연결이 원활하지 않아요. 다시 시도해 주세요.");
  }
}

function showToast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.opacity = "1";
  el.style.transform = "translateX(-50%) translateY(0)";
  clearTimeout(el._t);
  el._t = setTimeout(()=>{
    el.style.opacity = "0";
    el.style.transform = "translateX(-50%) translateY(8px)";
  }, 2600);
}

document.getElementById("q").addEventListener("input", e=>{ state.q = e.target.value; render(); });

/* ===================== 데이터 로드 ===================== */
const DATA_CACHE_KEY = "theo_crm_data_cache";

async function boot(){
  buildChips();
  let cached = null;
  try{
    const raw = localStorage.getItem(DATA_CACHE_KEY);
    if(raw) cached = JSON.parse(raw);
  }catch(e){}
  if(cached && cached.length){
    ALL_ITEMS = cached;
    render();
    buildChips();
  }
  try{
    const url = CONFIG.DATA_URL + "?mode=crmList";
    const res = await jsonpRetry(url, 20000);
    if(res && res.items){
      ALL_ITEMS = res.items;
      STATUS_OPTIONS = res.statusOptions || {};
      try{ localStorage.setItem(DATA_CACHE_KEY, JSON.stringify(res.items)); }catch(e){}
      render();
      buildChips();
    } else if(!cached){
      document.getElementById("list").innerHTML = `<div class="empty"><div class="em-t">불러올 수 없습니다.</div><div class="em-s">잠시 후 다시 시도해 주세요.</div></div>`;
    }
  }catch(e){
    if(!cached){
      document.getElementById("list").innerHTML = `<div class="empty"><div class="em-t">연결이 원활하지 않습니다.</div><div class="em-s">네트워크 상태를 확인해 주세요.</div></div>`;
    }
  }
}

/* ===================== 잠금화면 ===================== */
(function(){
  const lockScreen = document.getElementById("lockScreen");
  const lockInput  = document.getElementById("lockInput");
  const lockBtn    = document.getElementById("lockBtn");
  const lockErr    = document.getElementById("lockErr");

  let correctPass = null;
  let passLoaded  = false;
  let passLoading = false;
  const PASS_CACHE_KEY = "theo_crm_pass_cache";

  try{
    const cached = localStorage.getItem(PASS_CACHE_KEY);
    if(cached){ correctPass = cached; passLoaded = true; }
  }catch(e){}

  function unlock(){
    lockScreen.style.display = "none";
    syncHeaderSpacer();
    boot();
  }

  function tryUnlock(){
    const entered = lockInput.value.trim();
    if(!entered){ lockErr.textContent = "비밀번호를 입력해 주세요."; return; }
    if(!passLoaded){
      if(!passLoading){ lockErr.textContent = "서버에 연결하는 중..."; loadPass(); }
      return;
    }
    if(entered === correctPass){
      unlock();
    } else {
      lockErr.textContent = "비밀번호가 틀렸습니다.";
      lockInput.value = "";
      lockInput.focus();
    }
  }

  lockBtn.addEventListener("click", tryUnlock);
  lockInput.addEventListener("keydown", e=>{ if(e.key==="Enter") tryUnlock(); });

  async function loadPass(){
    if(passLoading) return;
    passLoading = true;
    const hadCache = passLoaded;
    try{
      const data = await jsonpRetry(CONFIG.DATA_URL + "?mode=pass", 15000);
      if(data && data.pass !== undefined){
        correctPass = String(data.pass).trim();
        passLoaded = true;
        if(!hadCache){ lockErr.textContent = ""; lockInput.focus(); }
        try{ localStorage.setItem(PASS_CACHE_KEY, correctPass); }catch(e){}
      }
    }catch(e){
      if(!hadCache) lockErr.textContent = "서버 연결이 원활하지 않습니다. 확인 버튼을 다시 눌러주세요.";
    }finally{
      passLoading = false;
    }
  }
  loadPass();
})();
