<!DOCTYPE html>
<html lang="ko">
<head>
<meta property="og:title" content="theo · CRM 관리">
<meta property="og:description" content="가망고객 · 매도임대 · 계약고객 연락 관리 시스템입니다.">
<meta property="og:image" content="https://theoexpkorea.github.io/exp-crm/og-image.png">
<meta property="og:url" content="https://theoexpkorea.github.io/exp-crm/">
<meta property="og:type" content="website">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3B1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CRM 관리">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<title>CRM 관리</title>
<style>
  :root{
    --bg:#F4F5F7; --surface:#FFFFFF; --ink:#15181E; --muted:#727A86;
    --line:#E6E8EC; --line-2:#EEF0F3; --accent:#96640F; --accent-soft:#FBF1E2;
    --chip:#F1F2F5;
    --danger:#E03A3A; --danger-bg:#FDECEC;
    --warn:#9A5B14; --warn-bg:#FBF1E2;
    --ok:#1F7A4D; --ok-bg:#E7F4ED;
    --shadow:0 1px 2px rgba(20,24,32,.04),0 6px 16px rgba(20,24,32,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0; overscroll-behavior-y:none; height:100%}
  *{-webkit-touch-callout:none; -webkit-user-select:none; user-select:none;}
  input, textarea{-webkit-user-select:text; user-select:text; -webkit-touch-callout:default;}
  body{
    font-family:"Pretendard","Pretendard Variable",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    font-feature-settings:"tnum" 1; -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .tnum{font-variant-numeric:tabular-nums}

  /* 잠금화면 */
  #lockScreen{
    position:fixed; inset:0; z-index:999; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px 24px; padding-top:calc(env(safe-area-inset-top) + 32px);
  }
  #lockScreen .lock-logo{font-size:28px; font-weight:800; letter-spacing:-.04em; margin-bottom:6px; color:var(--ink)}
  #lockScreen .lock-logo .o{color:var(--accent)}
  #lockScreen .lock-sub{font-size:13px; color:var(--muted); font-weight:600; margin-bottom:40px}
  #lockScreen .lock-box{width:100%; max-width:320px; background:var(--surface); border-radius:18px; padding:28px 24px; box-shadow:var(--shadow); border:1px solid var(--line)}
  #lockScreen .lock-title{font-size:15px; font-weight:800; color:var(--ink); margin-bottom:16px; text-align:center}
  #lockScreen .lock-input{
    width:100%; height:52px; border:1px solid var(--line); border-radius:12px;
    background:var(--bg); padding:0 16px; font-size:20px; font-family:inherit;
    text-align:center; letter-spacing:6px; outline:0; color:var(--ink);
    font-variant-numeric:tabular-nums; margin-bottom:12px;
  }
  #lockScreen .lock-input:focus{border-color:var(--accent); background:#fff}
  #lockScreen .lock-btn{width:100%; height:52px; border:0; border-radius:13px; background:var(--ink); color:#fff; font-size:15.5px; font-weight:800; cursor:pointer; font-family:inherit; transition:.12s}
  #lockScreen .lock-btn:active{opacity:.85}
  #lockScreen .lock-err{font-size:13px; font-weight:700; color:var(--danger); text-align:center; margin-top:10px; min-height:20px}

  /* 헤더 */
  header{
    position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px;
    z-index:30; background:var(--surface);
    border-bottom:1px solid var(--line); border-left:1px solid var(--line); border-right:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;
    box-sizing:border-box;
  }
  @media (min-width:481px){
    body{background:var(--line-2)}
    header{top:0}
  }
  .head-row{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:12px}
  .brand{display:flex; align-items:baseline; gap:8px}
  .brand .logo{font-size:21px; font-weight:800; letter-spacing:-.04em; margin:0; color:var(--ink); line-height:1}
  .brand .logo .o{color:var(--accent)}
  .brand .by{font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.02em}
  .count{font-size:13px; color:var(--muted); font-weight:600; flex:none}
  .count b{color:var(--accent); font-weight:800}

  .search{display:flex; align-items:center; gap:8px; background:var(--chip); border-radius:11px; padding:0 12px; height:40px; margin-bottom:10px}
  .search svg{flex:none; opacity:.5}
  .search input{border:0; background:transparent; outline:0; width:100%; height:100%; font-size:14.5px; color:var(--ink); font-family:inherit}
  .search input::placeholder{color:#9aa1ab}

  .chips{display:flex; gap:7px; overflow-x:auto; padding-bottom:2px; -ms-overflow-style:none; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:none; padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:700;
    background:var(--chip); color:var(--muted); border:1px solid transparent; cursor:pointer; white-space:nowrap;
  }
  .chip.on{background:var(--ink); color:#fff}

  #headerSpacer{width:100%}

  main{
    max-width:480px; margin:0 auto; box-sizing:border-box;
    padding:12px 12px calc(env(safe-area-inset-bottom) + 24px);
  }
  @media (min-width:481px){
    main{background:var(--bg); border-left:1px solid var(--line); border-right:1px solid var(--line); min-height:100vh}
  }

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:14px 15px; margin:0 4px 11px; box-shadow:var(--shadow);
  }
  .card.overdue{border-color:#F3C7C7}
  .card-top{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px}
  .card-top .tags{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
  .tag{font-size:11px; font-weight:800; padding:3px 8px; border-radius:7px; background:#F0F1F4; color:#3B414C}
  .tag.status{background:var(--accent-soft); color:var(--accent)}
  .badge{font-size:11.5px; font-weight:800; padding:3px 9px; border-radius:999px; flex:none}
  .badge.overdue{background:var(--danger-bg); color:var(--danger)}
  .badge.today{background:var(--warn-bg); color:var(--warn)}
  .badge.upcoming{background:var(--ok-bg); color:var(--ok)}

  .card .name{font-size:16px; font-weight:800; letter-spacing:-.01em; margin:0 0 2px}
  .card .id{font-size:11.5px; color:var(--muted); font-weight:600; margin-bottom:8px}
  .card .memo{font-size:12.5px; color:var(--muted); line-height:1.5; white-space:pre-line; margin-bottom:10px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}

  .card .row{display:flex; gap:8px}
  .btn{
    flex:1; height:42px; border-radius:11px; border:1.5px solid var(--line);
    background:var(--surface); color:var(--ink); font-size:13.5px; font-weight:800;
    display:flex; align-items:center; justify-content:center; gap:6px;
    cursor:pointer; font-family:inherit; text-decoration:none;
  }
  .btn:active{opacity:.75}
  .btn.primary{background:var(--ink); color:#fff; border-color:var(--ink)}

  .panel{
    margin-top:12px; padding-top:12px; border-top:1px solid var(--line-2);
    display:none;
  }
  .panel.show{display:block}
  .field{margin-bottom:10px}
  .field label{display:block; font-size:11.5px; font-weight:700; color:var(--muted); margin-bottom:5px}
  .field input[type=date], .field textarea{
    width:100%; border:1px solid var(--line); border-radius:10px; padding:9px 11px;
    font-size:14px; font-family:inherit; color:var(--ink); outline:0; background:var(--bg);
  }
  .field input[type=date]:focus, .field textarea:focus{border-color:var(--accent); background:#fff}
  .field textarea{resize:none; min-height:56px; line-height:1.4}
  .quick-days{display:flex; gap:6px; margin-top:6px}
  .quick-days button{
    flex:1; height:32px; border-radius:8px; border:1px solid var(--line); background:var(--surface);
    font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; font-family:inherit;
  }
  .quick-days button.on{background:var(--accent-soft); color:var(--accent); border-color:#D7DEFB}

  .empty{text-align:center; padding:64px 24px; color:var(--muted)}
  .empty .em-t{font-size:15px; font-weight:700; color:var(--ink); margin-bottom:6px}
  .empty .em-s{font-size:13px}

  .loading{text-align:center; padding:80px 24px; color:var(--muted)}
  .loading .sp{display:inline-block; width:28px; height:28px; border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin-bottom:12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  #toast{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(8px);
    background:#15181E; color:#fff; padding:11px 18px; border-radius:12px;
    font-size:13px; font-weight:700; z-index:999; box-shadow:0 8px 24px rgba(0,0,0,.28);
    opacity:0; transition:opacity .2s ease, transform .2s ease; max-width:88vw; text-align:center;
  }
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-logo">the<span class="o">o</span></div>
  <div class="lock-sub">CRM</div>
  <div class="lock-box">
    <div class="lock-title">비밀번호를 입력하세요.</div>
    <input id="lockInput" class="lock-input" type="password" name="pin-code-not-a-password"
      inputmode="numeric" maxlength="8" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false">
    <button class="lock-btn" id="lockBtn">확인</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<header>
  <div class="head-row">
    <div class="brand">
      <span class="logo">the<span class="o">o</span></span>
      <span class="by">CRM 관리 · eXp Korea</span>
    </div>
    <div class="count"><b id="cnt">0</b>건</div>
  </div>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="text" placeholder="이름 · 번호 · 연락처 검색">
  </div>
  <div class="chips" id="chips"></div>
</header>
<div id="headerSpacer"></div>

<main id="list">
  <div class="loading"><div class="sp"></div><div>불러오는 중...</div></div>
</main>

<div id="toast"></div>

<script>
/* ===================== 설정 ===================== */
const CONFIG = {
  DATA_URL: "https://script.google.com/macros/s/AKfycbzDk9DYfD7okIfp4_MH5asXVxgroC9qlYGL08yHL_0dXPDfWElTdKglhQ-BQxWVoiil/exec"
};
const CAT_ORDER = ["SALE","LEAD","CONTRACT"];
const CAT_LABEL = { SALE:"매도임대", LEAD:"가망고객", CONTRACT:"계약고객" };
const NEXT_DAYS_DEFAULT = { SALE:20, LEAD:7, CONTRACT:30 };

let ALL_ITEMS = [];
let state = { cat:"전체", q:"" };

/* ===================== JSONP 유틸 ===================== */
function jsonp(url, timeoutMs){
  return new Promise(function(resolve, reject){
    const cb = "__crm_cb_"+Date.now()+"_"+Math.floor(Math.random()*100000);
    const s = document.createElement("script");
    let done = false;
    window[cb] = function(data){ done=true; cleanup(); resolve(data); };
    function cleanup(){ try{ delete window[cb]; }catch(e){} if(s.parentNode) s.parentNode.removeChild(s); }
    s.onerror = function(){ if(!done){ cleanup(); reject(new Error("load fail")); } };
    const sep = url.indexOf("?")>=0 ? "&" : "?";
    s.src = url + sep + "callback=" + cb;
    document.head.appendChild(s);
    setTimeout(function(){ if(!done){ cleanup(); reject(new Error("timeout")); } }, timeoutMs);
  });
}
async function jsonpRetry(url, timeoutMs){
  try{ return await jsonp(url, timeoutMs); }
  catch(e){ await new Promise(r=>setTimeout(r,800)); return await jsonp(url, timeoutMs); }
}

/* ===================== 날짜 유틸 ===================== */
function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function addDays(dateStr, n){
  const base = dateStr ? new Date(dateStr+"T00:00:00") : new Date();
  base.setDate(base.getDate()+n);
  return base.getFullYear()+"-"+String(base.getMonth()+1).padStart(2,"0")+"-"+String(base.getDate()).padStart(2,"0");
}
function dDay(nextStr){
  if(!nextStr) return null;
  const t = new Date(todayStr()+"T00:00:00");
  const n = new Date(nextStr+"T00:00:00");
  return Math.round((n - t) / 86400000);
}
function dDayBadge(nextStr){
  const d = dDay(nextStr);
  if(d===null) return "";
  if(d < 0) return `<span class="badge overdue">D+${-d} 지남</span>`;
  if(d === 0) return `<span class="badge today">오늘</span>`;
  return `<span class="badge upcoming">D-${d}</span>`;
}

/* ===================== 렌더 ===================== */
function buildChips(){
  const chips = document.getElementById("chips");
  const cats = ["전체", ...CAT_ORDER];
  chips.innerHTML = cats.map(c=>{
    const label = c==="전체" ? "전체" : CAT_LABEL[c];
    const on = state.cat===c ? "on" : "";
    return `<div class="chip ${on}" data-cat="${c}">${label}</div>`;
  }).join("");
  chips.querySelectorAll(".chip").forEach(el=>{
    el.addEventListener("click", ()=>{ state.cat = el.dataset.cat; buildChips(); render(); });
  });
}

function filtered(){
  const q = state.q.trim().toLowerCase();
  return ALL_ITEMS.filter(d=>{
    if(state.cat!=="전체" && d.cat!==state.cat) return false;
    if(q && !(d.name.toLowerCase().includes(q) || d.id.toLowerCase().includes(q) || d.tel.includes(q))) return false;
    return true;
  }).sort((a,b)=>{
    const da = a.nextContact ? new Date(a.nextContact) : new Date("2999-12-31");
    const db = b.nextContact ? new Date(b.nextContact) : new Date("2999-12-31");
    return da - db;
  });
}

function render(){
  const items = filtered();
  document.getElementById("cnt").textContent = items.length;
  const list = document.getElementById("list");
  if(!items.length){
    list.innerHTML = `<div class="empty"><div class="em-t">해당하는 항목이 없습니다.</div><div class="em-s">필터를 조정해 보세요.</div></div>`;
    return;
  }
  list.innerHTML = items.map(d=>{
    const d0 = dDay(d.nextContact);
    const overdueClass = (d0!==null && d0<0) ? "overdue" : "";
    const defDays = NEXT_DAYS_DEFAULT[d.cat] || 7;
    const suggestedNext = addDays(todayStr(), defDays);
    const key = d.cat+"_"+d.row;
    return `
    <div class="card ${overdueClass}" data-key="${key}">
      <div class="card-top">
        <div class="tags">
          <span class="tag">${d.catLabel}</span>
          ${d.status ? `<span class="tag status">${d.status}</span>` : ''}
        </div>
        ${dDayBadge(d.nextContact)}
      </div>
      <div class="name">${d.name||'(이름없음)'}</div>
      <div class="id tnum">${d.id}${d.tel ? ' · '+d.tel : ''} · 다음연락 ${d.nextContact||'-'}</div>
      ${d.memo ? `<div class="memo">${d.memo}</div>` : ''}
      <div class="row">
        ${d.tel ? `<a class="btn" href="tel:${d.tel}">📞 전화</a>` : `<span class="btn" style="opacity:.4;pointer-events:none">📞 전화</span>`}
        <button class="btn primary" onclick="togglePanel('${key}')">✅ 연락완료</button>
      </div>
      <div class="panel" id="panel_${key}">
        <div class="field">
          <label>다음 연락일</label>
          <input type="date" id="next_${key}" value="${suggestedNext}">
          <div class="quick-days">
            <button onclick="setQuick('${key}',7,this)">+7일</button>
            <button onclick="setQuick('${key}',14,this)">+14일</button>
            <button onclick="setQuick('${key}',20,this)">+20일</button>
            <button onclick="setQuick('${key}',30,this)">+30일</button>
          </div>
        </div>
        <div class="field">
          <label>메모 추가 (선택)</label>
          <textarea id="memo_${key}" placeholder="통화 내용을 간단히 남겨보세요"></textarea>
        </div>
        <div class="row">
          <button class="btn" onclick="togglePanel('${key}')">취소</button>
          <button class="btn primary" onclick="saveContact('${d.cat}',${d.row},'${key}')">저장</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function togglePanel(key){
  const p = document.getElementById("panel_"+key);
  if(!p) return;
  const willShow = !p.classList.contains("show");
  document.querySelectorAll(".panel.show").forEach(el=>el.classList.remove("show"));
  if(willShow) p.classList.add("show");
}
function setQuick(key, days, btn){
  document.getElementById("next_"+key).value = addDays(todayStr(), days);
  btn.parentNode.querySelectorAll("button").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
}

async function saveContact(cat, row, key){
  const nextVal = document.getElementById("next_"+key).value;
  const memoVal = document.getElementById("memo_"+key).value.trim();
  if(!nextVal){ showToast("다음 연락일을 선택해 주세요."); return; }

  const url = CONFIG.DATA_URL + "?mode=crmUpdate&sheet="+encodeURIComponent(cat)
    + "&row="+encodeURIComponent(row)
    + "&lastDate="+encodeURIComponent(todayStr())
    + "&nextDate="+encodeURIComponent(nextVal)
    + (memoVal ? "&memo="+encodeURIComponent(memoVal) : "");

  try{
    const res = await jsonpRetry(url, 15000);
    if(res && res.ok){
      const item = ALL_ITEMS.find(x=>x.cat===cat && x.row===row);
      if(item){
        item.lastContact = todayStr();
        item.nextContact = nextVal;
        if(memoVal){
          const tag = new Date().toISOString().slice(5,10).replace("-","/");
          item.memo = (item.memo ? item.memo+"\n" : "") + tag + " " + memoVal;
        }
      }
      showToast("저장됐어요 · 다음 연락일 "+nextVal);
      render();
    } else {
      showToast("저장에 실패했어요. 다시 시도해 주세요.");
    }
  }catch(e){
    showToast("연결이 원활하지 않아요. 다시 시도해 주세요.");
  }
}

function showToast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.opacity = "1";
  el.style.transform = "translateX(-50%) translateY(0)";
  clearTimeout(el._t);
  el._t = setTimeout(()=>{
    el.style.opacity = "0";
    el.style.transform = "translateX(-50%) translateY(8px)";
  }, 2600);
}

document.getElementById("q").addEventListener("input", e=>{ state.q = e.target.value; render(); });

/* ===================== 데이터 로드 ===================== */
const DATA_CACHE_KEY = "theo_crm_data_cache";

async function boot(){
  buildChips();
  let cached = null;
  try{
    const raw = localStorage.getItem(DATA_CACHE_KEY);
    if(raw) cached = JSON.parse(raw);
  }catch(e){}
  if(cached && cached.length){
    ALL_ITEMS = cached;
    render();
  }
  try{
    const url = CONFIG.DATA_URL + "?mode=crmList";
    const res = await jsonpRetry(url, 20000);
    if(res && res.items){
      ALL_ITEMS = res.items;
      try{ localStorage.setItem(DATA_CACHE_KEY, JSON.stringify(res.items)); }catch(e){}
      render();
    } else if(!cached){
      document.getElementById("list").innerHTML = `<div class="empty"><div class="em-t">불러올 수 없습니다.</div><div class="em-s">잠시 후 다시 시도해 주세요.</div></div>`;
    }
  }catch(e){
    if(!cached){
      document.getElementById("list").innerHTML = `<div class="empty"><div class="em-t">연결이 원활하지 않습니다.</div><div class="em-s">네트워크 상태를 확인해 주세요.</div></div>`;
    }
  }
}

function syncHeaderSpacer(){
  const h = document.querySelector("header");
  const sp = document.getElementById("headerSpacer");
  if(h && sp) sp.style.height = h.offsetHeight + "px";
}
window.addEventListener("resize", syncHeaderSpacer);

/* ===================== 잠금화면 ===================== */
(function(){
  const lockScreen = document.getElementById("lockScreen");
  const lockInput  = document.getElementById("lockInput");
  const lockBtn    = document.getElementById("lockBtn");
  const lockErr    = document.getElementById("lockErr");

  let correctPass = null;
  let passLoaded  = false;
  let passLoading = false;
  const PASS_CACHE_KEY = "theo_crm_pass_cache";

  try{
    const cached = localStorage.getItem(PASS_CACHE_KEY);
    if(cached){ correctPass = cached; passLoaded = true; }
  }catch(e){}

  function unlock(){
    lockScreen.style.display = "none";
    syncHeaderSpacer();
    boot();
  }

  function tryUnlock(){
    const entered = lockInput.value.trim();
    if(!entered){ lockErr.textContent = "비밀번호를 입력해 주세요."; return; }
    if(!passLoaded){
      if(!passLoading){ lockErr.textContent = "서버에 연결하는 중..."; loadPass(); }
      return;
    }
    if(entered === correctPass){
      unlock();
    } else {
      lockErr.textContent = "비밀번호가 틀렸습니다.";
      lockInput.value = "";
      lockInput.focus();
    }
  }

  lockBtn.addEventListener("click", tryUnlock);
  lockInput.addEventListener("keydown", e=>{ if(e.key==="Enter") tryUnlock(); });

  async function loadPass(){
    if(passLoading) return;
    passLoading = true;
    const hadCache = passLoaded;
    try{
      const data = await jsonpRetry(CONFIG.DATA_URL + "?mode=pass", 15000);
      if(data && data.pass !== undefined){
        correctPass = String(data.pass).trim();
        passLoaded = true;
        if(!hadCache){ lockErr.textContent = ""; lockInput.focus(); }
        try{ localStorage.setItem(PASS_CACHE_KEY, correctPass); }catch(e){}
      }
    }catch(e){
      if(!hadCache) lockErr.textContent = "서버 연결이 원활하지 않습니다. 확인 버튼을 다시 눌러주세요.";
    }finally{
      passLoading = false;
    }
  }
  loadPass();
})();
</script>
</body>
</html>
